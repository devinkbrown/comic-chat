name: Validate Codex and Claude workflow

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/copilot-instructions.md"
      - ".github/workflows/agent-workflow.yml"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/AI-DEVELOPMENT-WORKFLOW.md"
      - "docs/CPP26-ENGINEERING.md"
      - "docs/IRCv3-COVERAGE.md"
      - "docs/TRANSPORT-RETIREMENT.md"
      - "scripts/ai/**"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate agent configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        # actions/checkout v6.0.3, pinned to an immutable commit.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate schemas, roles, isolation, hooks, and handoffs
        shell: bash
        run: python3 scripts/ai/validate-workflow.py
