name: Build unofficial modern clients

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-modern.yml"
      - ".gitmodules"
      - "scripts/**"
      - "portable/**"
      - "third_party/mbedtls"
      - "v1.0-pre-modern/**"
      - "v2.5-beta-1-modern/**"
      - "artifacts/inc/**"
      - "artifacts/lib/i386/zlib.lib"

permissions:
  contents: read

jobs:
  build:
    name: Build, package, and smoke test
    # This GA image supplies Visual Studio 2026, MSVC 14.51, and the x86
    # Spectre-mitigated MFC libraries required by the C++26-mode legacy port.
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Check out source
        # actions/checkout v6.0.3, pinned to an immutable commit.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Verify pinned native dependencies
        shell: pwsh
        run: |
          $pins = @{
            "third_party/mbedtls" = "068ff080b369adfac81509f9b57b2afabaf82dc5"
            "third_party/libuv" = "1cfa32ff59c076ffb6ed735bbc8c18361558661f"
          }
          foreach ($entry in $pins.GetEnumerator()) {
            $actual = (git -C $entry.Key rev-parse HEAD).Trim()
            if ($actual -ne $entry.Value) {
              throw "$($entry.Key) submodule drift: expected $($entry.Value), got $actual"
            }
          }

      - name: Build pinned x86 native dependencies
        shell: pwsh
        run: |
          $prefix = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $portableInclude = (Join-Path $env:GITHUB_WORKSPACE "portable/include").Replace('\', '/')
          $mbedtlsUserConfig = (Join-Path $portableInclude "comicchat/mbedtls_user_config.h").Replace('\', '/')

          cmake -S third_party/libuv -B out/libuv -A Win32 `
            -DBUILD_TESTING=OFF `
            -DLIBUV_BUILD_SHARED=OFF `
            -DLIBUV_BUILD_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build out/libuv --config Release --target install --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          cmake -S third_party/mbedtls -B out/mbedtls -A Win32 `
            -DMBEDTLS_USER_CONFIG_FILE="$mbedtlsUserConfig" `
            -DCMAKE_C_FLAGS="/I$portableInclude" `
            -DENABLE_PROGRAMS=OFF `
            -DENABLE_TESTING=OFF `
            -DUNSAFE_BUILD=OFF `
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON `
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build out/mbedtls --config Release --target install --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build both modernized clients
        shell: cmd
        run: |
          for /f "usebackq delims=" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL (
            echo No Visual Studio C++ installation was found.
            exit /b 1
          )
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars32.bat"
          if errorlevel 1 exit /b 1
          echo MSVC toolchain selected:
          cl
          echo %VCToolsVersion% | findstr /b /r /c:"14\.5[1-9]\."
          if errorlevel 1 (
            echo MSVC 14.51 or newer is required; found %VCToolsVersion%.
            exit /b 1
          )
          if not exist "%VCToolsInstallDir%ATLMFC\lib\spectre\x86" (
            echo The x86 Spectre-mitigated MFC libraries are missing.
            exit /b 1
          )

          if exist "v1.0-pre-modern\Release" rmdir /s /q "v1.0-pre-modern\Release"
          pushd "v1.0-pre-modern"
          nmake /f chat.mak CFG="chat - Win32 Release"
          if errorlevel 1 exit /b 1
          popd

          if exist "v2.5-beta-1-modern\Release" rmdir /s /q "v2.5-beta-1-modern\Release"
          pushd "v2.5-beta-1-modern"
          rem /K reports every independent strict-mode source failure in one CI run.
          nmake /K /f chat.mak CFG="chat - Win32 Release"
          if errorlevel 1 exit /b 1
          popd

      - name: Create archival ZIP files
        shell: pwsh
        run: ./scripts/package-modern-builds.ps1 -SourceRepositoryUrl "${{ github.server_url }}/${{ github.repository }}"

      - name: Smoke test from random folders
        shell: pwsh
        run: ./scripts/smoke-test-modern-builds.ps1

      - name: Upload release-ready packages
        # actions/upload-artifact v4.6.2, pinned to an immutable commit.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: comic-chat-unofficial-modern-builds-${{ github.sha }}
          path: |
            out/modern-builds/*.zip
            out/modern-builds/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
