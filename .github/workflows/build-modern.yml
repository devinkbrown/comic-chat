name: Build unofficial modern clients

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-modern.yml"
      - ".gitmodules"
      - "scripts/**"
      - "portable/**"
      - "third_party/mbedtls"
      - "v1.0-pre-modern/**"
      - "v2.5-beta-1-modern/**"
      - "artifacts/inc/**"
      - "artifacts/lib/i386/zlib.lib"

permissions:
  contents: read

jobs:
  portable-clang:
    name: Portable strict C++26 (Clang 22.1.8)
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out source
        # actions/checkout v6.0.3, pinned to an immutable commit.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install exact upstream Clang and native build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg ninja-build pkg-config python3-pip \
            libcairo2-dev libdbus-1-dev libdecor-0-dev libegl1-mesa-dev libfontconfig1-dev libfreetype-dev \
            libgl-dev libharfbuzz-dev libicu-dev libudev-dev libuv1-dev libwayland-dev libxkbcommon-dev wayland-protocols \
            weston zlib1g-dev
          curl --fail --location --silent --show-error \
            https://apt.llvm.org/llvm-snapshot.gpg.key -o llvm-snapshot.gpg.key
          echo "8b2a587ffd672c4687e7581dad4b2f6c1bb2ad6b480cd9771ba2ff48e0b8c75d  llvm-snapshot.gpg.key" | sha256sum --check
          gpg --batch --dearmor --output llvm-snapshot.gpg llvm-snapshot.gpg.key
          sudo install -m 0644 llvm-snapshot.gpg /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | \
            sudo tee /etc/apt/sources.list.d/llvm-22.list >/dev/null
          sudo apt-get update
          clang_package='1:22.1.8~++20260613092238+e80beda6e255-1~exp1~20260613092253.78'
          sudo apt-get install -y --no-install-recommends "clang-22=${clang_package}"
          python3 -m pip install --break-system-packages 'meson==1.11.1'
          clang-22 --version | tee clang-version.txt
          grep -F 'clang version 22.1.8' clang-version.txt

      - name: Build hash-pinned fallbacks and run strict tests
        shell: bash
        run: |
          set -euo pipefail
          CC=clang-22 CXX=clang++-22 meson setup portable/build-ci portable \
            --buildtype=release \
            --force-fallback-for=sdl3,harfbuzz,icu,catch2
          meson compile -C portable/build-ci
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            meson test -C portable/build-ci --print-errorlogs

      - name: Launch the native frontend under a real Wayland compositor
        shell: bash
        run: |
          set -euo pipefail
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          chmod 700 "$XDG_RUNTIME_DIR"
          weston --backend=headless-backend.so --renderer=pixman \
            --socket=wayland-comicchat --idle-time=0 >weston.log 2>&1 &
          weston_pid=$!
          cleanup() {
            kill "$weston_pid" 2>/dev/null || true
            wait "$weston_pid" 2>/dev/null || true
            rm -rf "$XDG_RUNTIME_DIR"
          }
          trap cleanup EXIT
          for attempt in $(seq 1 100); do
            test -S "$XDG_RUNTIME_DIR/wayland-comicchat" && break
            sleep 0.05
          done
          test -S "$XDG_RUNTIME_DIR/wayland-comicchat" || {
            cat weston.log
            exit 1
          }
          WAYLAND_DISPLAY=wayland-comicchat SDL_VIDEODRIVER=wayland SDL_AUDIODRIVER=dummy \
            ./portable/build-ci/comic-chat --frames 1 --png wayland-smoke.png
          test -s wayland-smoke.png

  freebsd-clang:
    name: FreeBSD 15 native (Clang 22 / C++26)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build and test inside FreeBSD
        # vmactions/freebsd-vm v1.5.0, pinned to an immutable commit.
        uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0
        with:
          release: "15.0"
          usesh: true
          copyback: false
          prepare: |
            pkg install -y llvm22 meson ninja pkgconf cairo catch2 fontconfig freetype2 harfbuzz icu libuv sdl3
          run: |
            set -eu
            export CC=/usr/local/llvm22/bin/clang
            export CXX=/usr/local/llvm22/bin/clang++
            "$CXX" --version
            "$CXX" --version | grep -F 'clang version 22.'
            meson setup portable/build-freebsd portable --buildtype=release
            meson compile -C portable/build-freebsd
            SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
              meson test -C portable/build-freebsd --print-errorlogs
            SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
              ./portable/build-freebsd/comic-chat --frames 1 --png /var/tmp/comic-chat-freebsd.png
            test -s /var/tmp/comic-chat-freebsd.png

  openbsd-clang:
    name: OpenBSD 7.9 native (Clang 21 / C++26)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build and test inside OpenBSD
        # vmactions/openbsd-vm v1.4.5, pinned to an immutable commit.
        uses: vmactions/openbsd-vm@c941015845c0f0c429676840963dc63b226d4f69
        with:
          release: "7.9"
          usesh: true
          copyback: false
          prepare: |
            pkg_add llvm%21 meson ninja cairo harfbuzz icu4c libuv sdl3
          run: |
            set -eu
            export CC=/usr/local/llvm21/bin/clang
            export CXX=/usr/local/llvm21/bin/clang++
            export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/X11R6/lib/pkgconfig
            "$CXX" --version
            "$CXX" --version | grep -F 'clang version 21.'
            meson setup portable/build-openbsd portable --buildtype=release --force-fallback-for=catch2
            meson compile -C portable/build-openbsd
            SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
              meson test -C portable/build-openbsd --print-errorlogs
            SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
              ./portable/build-openbsd/comic-chat --frames 1 --png /tmp/comic-chat-openbsd.png
            test -s /tmp/comic-chat-openbsd.png

  build:
    name: Build, package, and smoke test
    # This GA image supplies Visual Studio 2026, MSVC 14.51, and the x86
    # Spectre-mitigated MFC libraries required by the C++26-mode legacy port.
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Check out source
        # actions/checkout v6.0.3, pinned to an immutable commit.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive
          persist-credentials: false

      - name: Verify pinned native dependencies
        shell: pwsh
        run: |
          $pins = @{
            "third_party/mbedtls" = "068ff080b369adfac81509f9b57b2afabaf82dc5"
            "third_party/libuv" = "1cfa32ff59c076ffb6ed735bbc8c18361558661f"
          }
          foreach ($entry in $pins.GetEnumerator()) {
            $actual = (git -C $entry.Key rev-parse HEAD).Trim()
            if ($actual -ne $entry.Value) {
              throw "$($entry.Key) submodule drift: expected $($entry.Value), got $actual"
            }
          }

      - name: Build pinned x86 native dependencies
        shell: pwsh
        run: |
          $prefix = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $portableInclude = (Join-Path $env:GITHUB_WORKSPACE "portable/include").Replace('\', '/')
          $mbedtlsUserConfig = (Join-Path $portableInclude "comicchat/mbedtls_user_config.h").Replace('\', '/')

          cmake -S third_party/libuv -B out/libuv -A Win32 `
            -DBUILD_TESTING=OFF `
            -DLIBUV_BUILD_SHARED=OFF `
            -DLIBUV_BUILD_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build out/libuv --config Release --target install --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          cmake -S third_party/mbedtls -B out/mbedtls -A Win32 `
            -DMBEDTLS_USER_CONFIG_FILE="$mbedtlsUserConfig" `
            -DCMAKE_C_FLAGS="/I$portableInclude" `
            -DENABLE_PROGRAMS=OFF `
            -DENABLE_TESTING=OFF `
            -DUNSAFE_BUILD=OFF `
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON `
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build out/mbedtls --config Release --target install --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build both modernized clients
        shell: cmd
        run: |
          for /f "usebackq delims=" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL (
            echo No Visual Studio C++ installation was found.
            exit /b 1
          )
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars32.bat"
          if errorlevel 1 exit /b 1
          echo MSVC toolchain selected:
          cl
          echo %VCToolsVersion% | findstr /b /r /c:"14\.5[1-9]\."
          if errorlevel 1 (
            echo MSVC 14.51 or newer is required; found %VCToolsVersion%.
            exit /b 1
          )
          if not exist "%VCToolsInstallDir%ATLMFC\lib\spectre\x86" (
            echo The x86 Spectre-mitigated MFC libraries are missing.
            exit /b 1
          )

          if exist "v1.0-pre-modern\Release" rmdir /s /q "v1.0-pre-modern\Release"
          pushd "v1.0-pre-modern"
          nmake /f chat.mak CFG="chat - Win32 Release"
          if errorlevel 1 exit /b 1
          popd

          if exist "v2.5-beta-1-modern\Release" rmdir /s /q "v2.5-beta-1-modern\Release"
          pushd "v2.5-beta-1-modern"
          rem /K reports every independent strict-mode source failure in one CI run.
          nmake /K /f chat.mak CFG="chat - Win32 Release"
          if errorlevel 1 exit /b 1
          popd

      - name: Create archival ZIP files
        shell: pwsh
        run: ./scripts/package-modern-builds.ps1 -SourceRepositoryUrl "${{ github.server_url }}/${{ github.repository }}"

      - name: Smoke test from random folders
        shell: pwsh
        run: ./scripts/smoke-test-modern-builds.ps1

      - name: Upload release-ready packages
        # actions/upload-artifact v4.6.2, pinned to an immutable commit.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: comic-chat-unofficial-modern-builds-${{ github.sha }}
          path: |
            out/modern-builds/*.zip
            out/modern-builds/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
