<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Comic Chat rules card</title>
  <desc>Armando partially occluded by a framed rule card with the source rising white hook.</desc>
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffdf7"/><stop offset=".68" stop-color="#f7f4ea"/><stop offset="1" stop-color="#ded7c9"/></linearGradient>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3a424c"/><stop offset=".5" stop-color="#20252c"/><stop offset="1" stop-color="#101419"/></linearGradient>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="3.8"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#s)" stroke="#20252c" stroke-linejoin="round">
    <path d="M28 30h200v200H28Z" fill="url(#p)" stroke-width="9"/>
    <path d="M39 41h178v178H39Z" fill="none" stroke="#c1c5cc" stroke-width="4"/>
    <path d="M39 41h178v49H39Z" fill="#f3c744" stroke="none" opacity=".9"/>
    <path d="M164 55h43v54h-43Z" fill="#20252c" stroke-width="6"/>
    <!-- rising white hook/check, source-defining rule mark -->
    <path d="m171 86 10 10 21-30" fill="none" stroke="#f7f4ea" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Armando remains visibly behind the rule card's right field. -->
  <g filter="url(#s)" stroke="#20252c" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 172 45 220c16 10 42 11 58 1l-8-45Z" fill="url(#i)" stroke-width="6.5"/>
    <path d="M57 137c-15 7-16 25-3 32 9 5 19 0 22-8-7 5-15 1-12-6 2-4 7-4 12-2" fill="url(#i)" stroke-width="6"/>
    <path d="M53 134c-13-23-3-47 19-60 16-10 36-11 50-3 6 4 8 9 7 15 11 3 21 9 26 18-10-4-19-3-26-1 8 4 13 9 17 16-10-4-18-5-25-3l5 9c-10-6-20-8-30-6-11 11-29 28-43 15Z" fill="url(#i)" stroke-width="7"/>
    <path d="M84 117c7-7 18-7 25-1 4 3 6 8 7 14l18 17c3 2 1 5-2 6l-14 3c4 5 3 9-2 12-3 2-6 2-9 2 2 5 0 10-4 13-3 3-7 4-10 4-2 4-6 6-10 7-13-7-17-20-15-39 1-17 6-32 16-38Z" fill="url(#p)" stroke-width="6.5"/>
    <path d="m78 119 5 8 5-7 5 7 5-8 5 7 5-7" fill="url(#i)" stroke-width="4"/>
    <circle cx="99" cy="135" r="10.5" fill="#7fa9ce" stroke-width="4.5"/><circle cx="101" cy="135" r="2" fill="#20252c" stroke="none"/>
    <path d="M107 157c7 3 13 2 18 0-2 6-6 9-10 10-4-2-6-5-8-10Zm-3 28c5 2 9 0 12-4 1 6 0 11-3 15-2-4-5-6-8-6Z" fill="#20252c" stroke-width="1"/>
  </g>
  <!-- foreground card edge occludes the portrait as in the original -->
  <path d="M123 119h94v100h-94" fill="none" stroke="#20252c" stroke-width="8" stroke-linejoin="round"/>
</svg>
