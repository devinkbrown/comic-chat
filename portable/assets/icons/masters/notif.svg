<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Comic Chat notification connection</title>
  <desc>Diagonal plug and cable connector preserving the source notification composition.</desc>
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef0f2"/><stop offset=".4" stop-color="#c1c5cc"/><stop offset="1" stop-color="#7b828c"/></linearGradient>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#424a54"/><stop offset=".52" stop-color="#20252c"/><stop offset="1" stop-color="#101419"/></linearGradient>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".32"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#s)" transform="translate(128 128) rotate(-45) scale(1.18) translate(-128 -128)" stroke="#20252c" stroke-linecap="round" stroke-linejoin="round">
    <!-- continuous cable with two explicit connector bodies -->
    <path d="M128-36v102M128 190v102" fill="none" stroke="url(#i)" stroke-width="15"/>
    <path d="M98 62h60v42c0 16-13 29-30 29s-30-13-30-29Z" fill="url(#c)" stroke-width="9"/>
    <path d="M105 70h46v17h-46Z" fill="#f7f4ea" stroke-width="6"/>
    <g stroke="#7b828c" stroke-width="6"><path d="M111 91v21"/><path d="M128 91v21"/><path d="M145 91v21"/></g>
    <path d="M103 139h50v51h-50Z" fill="url(#c)" stroke-width="9"/>
    <path d="M112 139v-16h32v16" fill="#f3c744" stroke-width="7"/>
    <path d="M111 166h34" stroke="#7b828c" stroke-width="6"/>
    <path d="M107 148h42" stroke="#fff" stroke-width="4" opacity=".6"/>
  </g>
  <circle cx="128" cy="128" r="9" fill="#d85852" stroke="#20252c" stroke-width="5"/>
</svg>
