<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Microsoft Comic Chat avatar document icon</title>
  <desc>Modern source-faithful folded avatar document with Armando's unoccluded authored profile.</desc>
  <defs>
    <linearGradient id="paper" x1="0.08" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.65" stop-color="#f7f4ea"/>
      <stop offset="1" stop-color="#ded7c9"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ea"/>
      <stop offset="0.5" stop-color="#c1c5cc"/>
      <stop offset="1" stop-color="#7b828c"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a424c"/>
      <stop offset="0.25" stop-color="#20252c"/>
      <stop offset="0.8" stop-color="#0e1217"/>
      <stop offset="1" stop-color="#333b45"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.3" cy="0.24" r="0.82">
      <stop offset="0" stop-color="#c1c5cc"/>
      <stop offset="0.2" stop-color="#59616b"/>
      <stop offset="0.58" stop-color="#20252c"/>
      <stop offset="1" stop-color="#0e1217"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset dy="18" result="offset"/>
      <feColorMatrix in="offset" values="0 0 0 0 .07 0 0 0 0 .09 0 0 0 0 .12 0 0 0 .28 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Folded document is authoritative and remains visible around the portrait. -->
  <g filter="url(#shadow)" stroke="#20252c" stroke-linejoin="round">
    <path d="M196 88H712L855 231V916H196Z" fill="url(#paper)" stroke-width="33"/>
    <path d="M712 88V231H855" fill="url(#fold)" stroke-width="28"/>
    <path d="M727 113L829 216H727Z" fill="#fffdf7" opacity="0.54" stroke="none"/>
    <path d="M225 122V881H821" fill="none" stroke="#c1c5cc" stroke-width="13" opacity="0.82"/>
    <path d="M232 137L691 137" fill="none" stroke="#fff" stroke-width="9" opacity="0.72"/>
  </g>

