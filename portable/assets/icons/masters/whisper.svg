<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Comic Chat whisper</title>
  <desc>Speech balloon with an explicitly broken dotted contour and quiet message marks.</desc>
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffdf7" stop-opacity=".96"/><stop offset=".72" stop-color="#f7f4ea" stop-opacity=".88"/><stop offset="1" stop-color="#c1c5cc" stop-opacity=".82"/></linearGradient>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".28"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#s)">
    <path d="M48 31h160c19 0 34 15 34 34v103c0 19-15 34-34 34h-38l-38 37 8-37H48c-19 0-34-15-34-34V65c0-19 15-34 34-34Z" fill="url(#p)" opacity=".86"/>
    <!-- Broken contour is the semantic signal; round caps remain discrete at large sizes. -->
    <path d="M48 31h160c19 0 34 15 34 34v103c0 19-15 34-34 34h-38l-38 37 8-37H48c-19 0-34-15-34-34V65c0-19 15-34 34-34Z" fill="none" stroke="#20252c" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 18"/>
    <path d="M48 42h160c13 0 23 10 23 23" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 16" opacity=".68"/>
    <g fill="#7b828c" stroke="#20252c" stroke-width="4">
      <circle cx="82" cy="117" r="10"/><circle cx="113" cy="117" r="10"/><circle cx="144" cy="117" r="10"/><circle cx="175" cy="117" r="10"/>
    </g>
    <path d="M75 148h108" stroke="#c1c5cc" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 13"/>
  </g>
</svg>
