<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Comic Chat room</title>
  <desc>Three staggered message panels preserving the source room composition.</desc>
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffdf7"/><stop offset=".66" stop-color="#f7f4ea"/><stop offset="1" stop-color="#ded7c9"/></linearGradient>
    <linearGradient id="y" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f9d96a"/><stop offset="1" stop-color="#f3c744"/></linearGradient>
    <pattern id="d" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#a78b29"/><circle cx="9" cy="9" r=".9" fill="#fff4bc"/></pattern>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="3.8"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#s)" stroke="#20252c" stroke-width="8" stroke-linejoin="round">
    <!-- rear panel -->
    <path d="M108 23h105c12 0 21 9 21 21v72c0 12-9 21-21 21h-15l-10 16 2-16h-82c-12 0-21-9-21-21V44c0-12 9-21 21-21Z" fill="url(#p)"/>
    <path d="M98 54h126v27H98Z" fill="url(#y)" stroke="none"/><path d="M98 54h126v27H98Z" fill="url(#d)" stroke="none" opacity=".7"/>
    <g stroke="#7b828c" stroke-width="5.5" stroke-linecap="round"><path d="M132 93h70"/><path d="M132 108h58"/></g>
    <!-- center panel -->
    <path d="M72 74h111c12 0 21 9 21 21v72c0 12-9 21-21 21h-15l-11 17 2-17H72c-12 0-21-9-21-21V95c0-12 9-21 21-21Z" fill="url(#p)"/>
    <path d="M62 104h132v28H62Z" fill="url(#y)" stroke="none"/><path d="M62 104h132v28H62Z" fill="url(#d)" stroke="none" opacity=".76"/>
    <g stroke="#7b828c" stroke-width="5.5" stroke-linecap="round"><path d="M93 145h76"/><path d="M93 160h61"/></g>
    <!-- front panel -->
    <path d="M35 133h99c12 0 21 9 21 21v61c0 12-9 21-21 21h-14l-10 14 2-14H35c-12 0-21-9-21-21v-61c0-12 9-21 21-21Z" fill="url(#p)"/>
    <path d="M25 158h120v25H25Z" fill="url(#y)" stroke="none"/><path d="M25 158h120v25H25Z" fill="url(#d)" stroke="none" opacity=".8"/>
    <g stroke="#7b828c" stroke-width="5" stroke-linecap="round"><path d="M54 196h73"/><path d="M54 211h52"/></g>
  </g>
</svg>
