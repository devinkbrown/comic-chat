<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Comic Chat ratings</title>
  <desc>Marked globe crossed by a central band of exactly three overlapping stars.</desc>
  <defs>
    <radialGradient id="ocean" cx=".3" cy=".25" r=".85"><stop stop-color="#8db9df"/><stop offset=".45" stop-color="#3d78b8"/><stop offset="1" stop-color="#254b78"/></radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7bbc88"/><stop offset=".55" stop-color="#4d9e67"/><stop offset="1" stop-color="#2f704c"/></linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fff1a3"/><stop offset=".45" stop-color="#f3c744"/><stop offset="1" stop-color="#b9911d"/></linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fffdf7"/><stop offset="1" stop-color="#d9d6cc"/></linearGradient>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="globe"><circle cx="128" cy="128" r="90"/></clipPath>
  </defs>
  <g filter="url(#s)" stroke="#20252c" stroke-linejoin="round">
    <circle cx="128" cy="128" r="94" fill="url(#ocean)" stroke-width="9"/>
    <g clip-path="url(#globe)">
      <path d="M50 82c18-28 40-39 66-43l15 14-12 12 8 16-17 12-9 21-22 1-9-16-21-3Zm98-37 30 6 9 16 19 8 8 23-16 8-12-10-15 9-16-12 6-17-17-10Zm-34 91 16-11 22 5 8 19-11 15 2 28-18 28-17-20 5-22-13-17Z" fill="url(#land)" stroke-width="4"/>
      <g fill="none" stroke="#f7f4ea" stroke-width="3" opacity=".52"><ellipse cx="128" cy="128" rx="48" ry="90"/><ellipse cx="128" cy="128" rx="19" ry="90"/><path d="M39 128h178M52 83c47 17 105 17 152 0M52 173c47-17 105-17 152 0"/></g>
      <path d="M68 65c34-24 86-28 125-2" fill="none" stroke="#fff" stroke-width="7" opacity=".32"/>
    </g>
    <!-- center ratings band -->
    <path d="M18 102h220v57H18Z" fill="url(#band)" stroke-width="7"/>
    <path d="M22 108h212" stroke="#fff" stroke-width="4" opacity=".72"/>
    <!-- exactly three overlapping stars -->
    <path d="m75 104 9 20 22 2-17 15 5 22-19-11-19 11 5-22-17-15 22-2Z" fill="url(#star)" stroke-width="5"/>
    <path d="m128 96 10 23 25 2-19 17 6 24-22-12-22 12 6-24-19-17 25-2Z" fill="url(#star)" stroke-width="5.5"/>
    <path d="m181 104 9 20 22 2-17 15 5 22-19-11-19 11 5-22-17-15 22-2Z" fill="url(#star)" stroke-width="5"/>
    <path d="m117 119 11-4 11 4" fill="none" stroke="#fff4bc" stroke-width="3" opacity=".8"/>
  </g>
</svg>
