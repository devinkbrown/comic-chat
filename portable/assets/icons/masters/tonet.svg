<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <title>Connect to Comic Chat network</title>
  <desc>Marked network globe on a stable pedestal stand.</desc>
  <defs>
    <radialGradient id="o" cx=".32" cy=".25" r=".82"><stop stop-color="#86c8d9"/><stop offset=".4" stop-color="#3d78b8"/><stop offset="1" stop-color="#244b72"/></radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7bbc88"/><stop offset=".55" stop-color="#4d9e67"/><stop offset="1" stop-color="#2f704c"/></linearGradient>
    <linearGradient id="stand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff1a3"/><stop offset=".45" stop-color="#f3c744"/><stop offset="1" stop-color="#a47f16"/></linearGradient>
    <filter id="s" x="-30%" y="-30%" width="170%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dy="5"/><feComponentTransfer><feFuncA type="linear" slope=".3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="c"><circle cx="128" cy="96" r="74"/></clipPath>
