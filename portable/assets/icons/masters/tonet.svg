      <g fill="none" stroke="#f7f4ea" stroke-width="2.8" opacity=".55"><ellipse cx="128" cy="96" rx="38" ry="74"/><ellipse cx="128" cy="96" rx="15" ry="74"/><path d="M54 96h148M66 61c39 14 86 14 124 0M66 131c39-14 86-14 124 0"/></g>
      <path d="M73 44c29-19 70-22 105-4" fill="none" stroke="#fff" stroke-width="6" opacity=".32"/>
