# Windows cross-build via Clang targeting mingw-w64, using mingw-w64-binutils'
# native GNU ld for linking (not lld: lld's mingw/COFF driver lacks
# --allow-shlib-undefined, which meson's own find_library probe emits; GNU ld
# for the mingw target handles it fine). ThinLTO is intentionally OFF for this
# cross target (-Db_lto=false) -- Clang's ThinLTO bitcode objects can only be
# linked by lld/gold+LLVMgold, not plain binutils ld, and it's pure codegen,
# not semantics.
#
# Configure with (pixman's SSE2 combiner file trips this project's -Werror on
# intentional unused-parameter signatures; cairo's own subproject wiring of
# pixman doesn't inherit comic-chat-native's cairo_dep default_options, so it
# needs its own direct override):
#   meson setup <builddir> portable --cross-file portable/cross/x86_64-w64-mingw32-clang.ini \
#     -Dfrontend=true -Dtests=false --buildtype=release -Db_lto=false \
#     -Dpixman:werror=false -Dpixman:warning_level=0
#
# Run under Wine: `wine <builddir>/comic-chat.exe ...` (exe_wrapper below lets
# `meson test`/cross-compiled sanity checks run transparently too).

[binaries]
c = ['clang', '--target=x86_64-w64-mingw32']
cpp = ['clang++', '--target=x86_64-w64-mingw32']
ar = 'x86_64-w64-mingw32-ar'
strip = 'x86_64-w64-mingw32-strip'
windres = 'x86_64-w64-mingw32-windres'
exe_wrapper = 'wine'

[built-in options]
# -lwinpthread: mingw-w64-headers ships a pthread.h shim, so subprojects that
# probe for <pthread.h> (e.g. ICU) detect POSIX threads and emit
# pthread_mutex_*/pthread_once calls, but their own build files don't always
# add the implementing library to the link line. Linking it globally sidesteps
# chasing this per-subproject.
c_link_args = ['-fuse-ld=/usr/bin/x86_64-w64-mingw32-ld', '-lwinpthread']
cpp_link_args = ['-fuse-ld=/usr/bin/x86_64-w64-mingw32-ld', '-lwinpthread']

[host_machine]
system = 'windows'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[properties]
sys_root = '/usr/x86_64-w64-mingw32'
